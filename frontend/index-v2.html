<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUET by BCAG</title>
    <style>
        /* === 基礎設定 === */
        :root {
            --text-color: #f0e8db;
            --accent-color: #d4af37;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background: radial-gradient(circle at center, #1A1A1A 0%, #000000 100%);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
        }

        /* === Header === */
        header {
            text-align: center;
            padding: 20px 0 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            line-height: 1.2;
            font-weight: normal;
        }

        .title-duet {
            font-family: 'Helvetica', sans-serif;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .title-bcag {
            font-family: "Big Caslon", "Book Antiqua", "Palatino Linotype", serif;
            font-weight: 400;
            font-size: 1.25rem;
        }

        .subtitle {
            font-family: 'Helvetica', sans-serif;
            font-size: 0.9rem;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ccc;
        }

        /* === Main Layout === */
        main {
            display: flex;
            height: calc(100vh - 100px);
        }

        /* === Sidebar === */
        #sidebar {
            width: 320px;
            background-color: rgba(10, 10, 10, 0.8);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
        }

        #sidebar::-webkit-scrollbar {
            width: 6px;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #bbb;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: var(--text-color);
            font-size: 0.95rem;
            border-radius: 2px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .letter-input {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Slider */
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
            margin: 10px 0;
        }

        input[type="range"]::-webkit-slider-track {
            width: 100%;
            height: 2px;
            background: #444;
            border-radius: 1px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -6px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 5px;
        }

        .slider-value {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Stats */
        .stats {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-radius: 3px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #999;
        }

        .stat-value {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Button */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-color), #aa8a2e);
            color: #000;
            border: none;
            border-radius: 2px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* === Viewport === */
        #viewport {
            flex: 1;
            position: relative;
            background: #000;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        /* Loading */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #333;
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-text {
            color: #666;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        /* Backend URL */
        .backend-url {
            background: rgba(0, 100, 200, 0.1);
            padding: 12px;
            border-radius: 3px;
            border: 1px solid rgba(0, 100, 200, 0.3);
            margin-bottom: 20px;
        }

        .backend-url label {
            color: #6ba3ff;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .backend-url input {
            margin-top: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            <span class="title-duet">DUET</span>
            <span class="title-bcag">by BCAG</span>
        </h1>
        <p class="subtitle">Custom Dual-Letter Pendant Designer</p>
    </header>

    <main>
        <aside id="sidebar">
            <!-- Backend URL -->
            <div class="backend-url">
                <label>Backend API URL</label>
                <input type="text" id="backendUrl" placeholder="https://your-backend.onrender.com">
            </div>

            <!-- Letters -->
            <div class="section">
                <div class="section-title">Letters</div>
                
                <div class="control-group">
                    <label>Front Letter</label>
                    <input type="text" id="letter1" value="D" maxlength="1" class="letter-input">
                </div>

                <div class="control-group">
                    <label>Front Font</label>
                    <select id="font1">
                        <option value="Liberation Sans:style=Bold">Liberation Sans Bold</option>
                        <option value="Liberation Serif:style=Bold">Liberation Serif Bold</option>
                        <option value="Liberation Mono:style=Bold">Liberation Mono Bold</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Side Letter (90°)</label>
                    <input type="text" id="letter2" value="T" maxlength="1" class="letter-input">
                </div>

                <div class="control-group">
                    <label>Side Font</label>
                    <select id="font2">
                        <option value="Liberation Sans:style=Bold">Liberation Sans Bold</option>
                        <option value="Liberation Serif:style=Bold">Liberation Serif Bold</option>
                        <option value="Liberation Mono:style=Bold">Liberation Mono Bold</option>
                    </select>
                </div>
            </div>

            <!-- Design -->
            <div class="section">
                <div class="section-title">Design</div>
                
                <div class="control-group">
                    <label>Material</label>
                    <select id="material">
                        <option value="gold18k">18K Yellow Gold</option>
                        <option value="rosegold">18K Rose Gold</option>
                        <option value="whitegold">18K White Gold</option>
                        <option value="silver">925 Sterling Silver</option>
                        <option value="platinum">Platinum PT950</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Size (Height)</label>
                    <select id="size">
                        <option value="15">15 mm (Petite)</option>
                        <option value="20" selected>20 mm (Standard)</option>
                        <option value="25">25 mm (Grand)</option>
                        <option value="30">30 mm (Statement)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Environment Light Intensity</label>
                    <div class="slider-label">
                        <span>Brightness</span>
                        <span class="slider-value" id="envValue">0.6</span>
                    </div>
                    <input type="range" id="envIntensity" min="0" max="3" step="0.1" value="0.6">
                </div>
            </div>

            <!-- Bail Adjustment -->
            <div class="section">
                <div class="section-title">Bail Adjustment</div>
                
                <div class="control-group">
                    <div class="slider-label">
                        <span>Position X</span>
                        <span class="slider-value" id="xValue">0</span>
                    </div>
                    <input type="range" id="bailX" min="-15" max="15" step="0.5" value="0">
                </div>

                <div class="control-group">
                    <div class="slider-label">
                        <span>Position Y (Height)</span>
                        <span class="slider-value" id="yValue">0</span>
                    </div>
                    <input type="range" id="bailY" min="-10" max="10" step="0.5" value="0">
                </div>

                <div class="control-group">
                    <div class="slider-label">
                        <span>Position Z</span>
                        <span class="slider-value" id="zValue">0</span>
                    </div>
                    <input type="range" id="bailZ" min="-15" max="15" step="0.5" value="0">
                </div>

                <div class="control-group">
                    <div class="slider-label">
                        <span>Rotation Y</span>
                        <span class="slider-value" id="rotValue">0°</span>
                    </div>
                    <input type="range" id="bailRotation" min="-180" max="180" step="5" value="0">
                </div>
            </div>

            <!-- Stats -->
            <div class="section">
                <div class="section-title">Estimated Stats</div>
                <div class="stats">
                    <div class="stat-row">
                        <span class="stat-label">Volume</span>
                        <span class="stat-value" id="volumeValue">-- mm³</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Weight</span>
                        <span class="stat-value" id="weightValue">-- g</span>
                    </div>
                </div>
            </div>

            <!-- Download Button -->
            <button id="downloadBtn">Download Production STL</button>
        </aside>

        <div id="viewport">
            <div id="canvas-container"></div>
            <div id="loading">
                <div class="spinner"></div>
                <div id="loading-text">GENERATING MODEL...</div>
            </div>
        </div>
    </main>

    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';

        // Material densities (g/cm³)
        const MATERIAL_DENSITIES = {
            gold18k: 15.6,
            rosegold: 15.0,
            whitegold: 15.8,
            silver: 10.5,
            platinum: 21.45
        };

        const MATERIAL_COLORS = {
            gold18k: 0xFFD700,
            rosegold: 0xB76E79,
            whitegold: 0xE5E4E2,
            silver: 0xC0C0C0,
            platinum: 0xE5E4E2
        };

        let scene, camera, renderer, controls;
        let currentMesh = null;
        let currentSTLData = null;
        let updateTimer = null;

        // Initialize Three.js
        function init() {
            const container = document.getElementById('canvas-container');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Camera
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(40, 30, 40);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight1.position.set(1, 1, 1);
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-1, -1, -1);
            scene.add(directionalLight2);

            // Resize handler
            window.addEventListener('resize', onResize);

            // Animation loop
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // Update model from backend
        async function updateModel() {
            const backendUrl = document.getElementById('backendUrl').value.trim();
            if (!backendUrl) {
                alert('Please enter backend URL first!');
                return;
            }

            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            const data = {
                letter1: document.getElementById('letter1').value.toUpperCase(),
                letter2: document.getElementById('letter2').value.toUpperCase(),
                font1: document.getElementById('font1').value,
                font2: document.getElementById('font2').value,
                size: parseFloat(document.getElementById('size').value),
                pendant: {
                    x: parseFloat(document.getElementById('bailX').value),
                    y: parseFloat(document.getElementById('bailY').value),
                    z: parseFloat(document.getElementById('bailZ').value),
                    rotation_y: parseFloat(document.getElementById('bailRotation').value)
                }
            };

            try {
                const response = await fetch(`${backendUrl}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const blob = await response.blob();
                currentSTLData = blob;
                
                // Load STL
                const arrayBuffer = await blob.arrayBuffer();
                const loader = new STLLoader();
                const geometry = loader.parse(arrayBuffer);
                
                // Remove old mesh
                if (currentMesh) {
                    scene.remove(currentMesh);
                    currentMesh.geometry.dispose();
                    currentMesh.material.dispose();
                }

                // Create new mesh
                const material = new THREE.MeshStandardMaterial({
                    color: MATERIAL_COLORS[document.getElementById('material').value],
                    metalness: 0.9,
                    roughness: 0.2
                });

                currentMesh = new THREE.Mesh(geometry, material);
                scene.add(currentMesh);

                // Center and frame
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                currentMesh.position.sub(center);

                // Calculate stats
                calculateStats(geometry);

                loading.style.display = 'none';

            } catch (error) {
                console.error('Error:', error);
                alert(`Error: ${error.message}`);
                loading.style.display = 'none';
            }
        }

        // Calculate volume and weight
        function calculateStats(geometry) {
            let volume = 0;
            const positions = geometry.attributes.position;
            
            for (let i = 0; i < positions.count; i += 3) {
                const p1 = new THREE.Vector3().fromBufferAttribute(positions, i);
                const p2 = new THREE.Vector3().fromBufferAttribute(positions, i + 1);
                const p3 = new THREE.Vector3().fromBufferAttribute(positions, i + 2);
                volume += p1.dot(p2.cross(p3)) / 6.0;
            }
            
            volume = Math.abs(volume);
            const material = document.getElementById('material').value;
            const density = MATERIAL_DENSITIES[material];
            const weight = volume * density / 1000; // mm³ to cm³

            document.getElementById('volumeValue').textContent = volume.toFixed(2) + ' mm³';
            document.getElementById('weightValue').textContent = weight.toFixed(2) + ' g';
        }

        // Debounced update
        function scheduleUpdate() {
            clearTimeout(updateTimer);
            updateTimer = setTimeout(updateModel, 800);
        }

        // Update material color
        function updateMaterial() {
            if (currentMesh) {
                const material = document.getElementById('material').value;
                currentMesh.material.color.setHex(MATERIAL_COLORS[material]);
            }
            scheduleUpdate();
        }

        // Download STL
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!currentSTLData) {
                alert('Please generate a model first!');
                return;
            }

            const letter1 = document.getElementById('letter1').value.toUpperCase();
            const letter2 = document.getElementById('letter2').value.toUpperCase();
            const url = URL.createObjectURL(currentSTLData);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${letter1}${letter2}_DUET.stl`;
            a.click();
            URL.revokeObjectURL(url);
        });

        // Event listeners
        document.getElementById('letter1').addEventListener('input', scheduleUpdate);
        document.getElementById('letter2').addEventListener('input', scheduleUpdate);
        document.getElementById('font1').addEventListener('change', scheduleUpdate);
        document.getElementById('font2').addEventListener('change', scheduleUpdate);
        document.getElementById('size').addEventListener('change', scheduleUpdate);
        document.getElementById('material').addEventListener('change', updateMaterial);
        
        // Bail sliders
        ['bailX', 'bailY', 'bailZ', 'bailRotation'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                const valueId = id === 'bailRotation' ? 'rotValue' : id.replace('bail', '').toLowerCase() + 'Value';
                const suffix = id === 'bailRotation' ? '°' : '';
                document.getElementById(valueId).textContent = e.target.value + suffix;
                scheduleUpdate();
            });
        });

        // Environment light
        document.getElementById('envIntensity').addEventListener('input', (e) => {
            document.getElementById('envValue').textContent = e.target.value;
        });

        // Initialize
        init();

        // Keep-alive ping
        setInterval(() => {
            const backendUrl = document.getElementById('backendUrl').value.trim();
            if (backendUrl) {
                fetch(`${backendUrl}/health`).catch(() => {});
            }
        }, 10 * 60 * 1000);
    </script>
</body>
</html>
